manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: smchunn
      url-base: https://github.com/smchunn

  projects:
    - name: zmk
      remote: zmkfirmware
      import: app/west.yml
      # Pinned to the last release before ZMK main moved to Zephyr 4.1 (2025-12-09),
      # which dropped the boards/arm layout + arm/rpi_pico/rp2040.dtsi that the
      # smcboard40 board and nice_nano_v2 shields depend on. Bump only after the
      # board is migrated to the Zephyr 4.1 hardware-model v2 layout.
      revision: v0.3.0

    - name: zmk-keyboards-smcboard40
      remote: smchunn
      revision: main

  self:
    path: config
