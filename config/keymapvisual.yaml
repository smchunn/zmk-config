# https://github.com/caksoylar/keymap-drawer
# Hand-maintained visual of config/smcboard40.keymap (4x10 ortho, 40 keys).
# Render at https://keymap-drawer.streamlit.app or: keymap draw config/keymapvisual.yaml > keymap.svg
# WM/WMOS labels describe the action; the underlying chords are F13-F20 (F16-F20 = WM,
# F13-F15 = WMOS) under a positional modifier scheme (see the keymap header). Keep in sync.

layout: {ortho_layout: {split: true, rows: 4, columns: 5}}

layers:
  BASE:                # Colemak-DH
    - [Q, W, F, P, B, J, L, U, Y, "'"]
    - [{h: Shift, t: A}, {h: Ctrl, t: R}, {h: Alt, t: S}, {h: Gui, t: T}, G, M, {h: Gui, t: N}, {h: Alt, t: E}, {h: Ctrl, t: I}, {h: Shift, t: O}]
    - [Z, X, C, D, V, K, H, {t: ",", s: ";"}, {t: ".", s: ":"}, {t: "/", s: "\\"}]
    - [null, {h: WM, t: WMOS}, null, {h: Meh, t: Spc}, Shift, NAV, SYM, null, FN, null]
  GAME:
    - [Q, W, F, P, B, J, L, U, Y, "'"]
    - [A, R, S, T, G, M, {h: Gui, t: N}, {h: Alt, t: E}, {h: Ctrl, t: I}, {h: Shift, t: O}]
    - [Z, X, C, D, V, K, H, {t: ",", s: ";"}, {t: ".", s: ":"}, {t: "/", s: "\\"}]
    - [Ctrl, Alt, Gui, Spc, Shift, NAV, SYM, "▽", "▽", null]
  QWRT:
    - [Q, W, E, R, T, Y, U, I, O, P]
    - [{h: Shift, t: A}, {h: Ctrl, t: S}, {h: Alt, t: D}, {h: Gui, t: F}, G, H, {h: Gui, t: J}, {h: Alt, t: K}, {h: Ctrl, t: L}, {h: Shift, t: "'"}]
    - [Z, X, C, V, B, N, M, {t: ",", s: ";"}, {t: ".", s: ":"}, {t: "/", s: "\\"}]
    - [null, {h: WM, t: WMOS}, null, {h: Meh, t: Spc}, Shift, NAV, SYM, null, "▽", null]
  SYM:
    - ["!", "@", "#", "$", "%", "^", "&", "*", "|", "?"]
    - [{h: Shift, t: "1"}, {h: Ctrl, t: "2"}, {h: Alt, t: "3"}, {h: Gui, t: "4"}, "5", "6", {h: Gui, t: "7"}, {h: Alt, t: "8"}, {h: Ctrl, t: "9"}, {h: Shift, t: "0"}]
    - ["+", "=", {t: "{", s: "["}, {t: "}", s: "]"}, {t: "~", s: "`"}, "!", {t: "(", s: "<"}, {t: ")", s: ">"}, "-", "_"]
    - [null, "▽", "▽", "▽", "▽", "▽", {type: held}, "▽", "▽", null]
  FN:
    - [F11, F12, null, null, null, null, null, BASE, QWRT, GAME]
    - [F1, F2, F3, F4, F5, F6, F7, F8, F9, F10]
    - ["Bri-", "Bri+", "Vol-", "Vol+", null, null, null, null, null, null]
    - [null, "▽", "▽", "▽", "▽", "▽", "▽", "▽", {type: held}, null]
  FNOS:                # one-shot function keys
    - [F11, F12, null, null, null, null, null, null, null, null]
    - [F1, F2, F3, F4, F5, F6, F7, F8, F9, F10]
    - [null, null, null, null, null, null, null, null, null, null]
    - [null, "▽", "▽", "▽", "▽", "▽", "▽", "▽", {type: held}, null]
  NAV:
    - [ESC, null, null, null, null, null, ESC, TAB, DEL, BSPC]
    - [Shift, Ctrl, Alt, Gui, null, "←", "↓", "↑", "→", Enter]
    - [null, null, null, null, null, Home, PgDn, PgUp, End, null]
    - [null, "▽", "▽", "▽", "▽", {type: held}, null, "▽", "▽", null]
  WM:                  # hold LH3 — windows + apps + spaces (F16-F20)
    - [cal, mail, chatgpt, safari, kitty, "w +", "w -", "h +", "h -", "rot 90"]
    - ["sp 5", "sp 4", "sp 3", "sp 2", "sp 1", "sp prev", "sp next", "▽", "▽", "▽"]
    - [balance, "swp prev", "swp next", "foc prev", "foc next", "▽", "▽", "▽", "▽", "▽"]
    - [null, {type: held}, "▽", "▽", "▽", "▽", "▽", "▽", "▽", null]
  WMOS:                # tap LH3 — one-shot window ops (F13-F15, left cluster)
    - ["zoom par", "bsp/stk", split, full, float, "▽", "▽", "▽", "▽", "▽"]
    - ["→sp 5", "→sp 4", "→sp 3", "→sp 2", "→sp 1", "▽", "▽", "▽", "▽", "▽"]
    - ["rst skhd", "rst yabai", balance, "mir y", "mir x", "▽", "▽", "▽", "▽", "▽"]
    - [null, {type: held}, "▽", "▽", "▽", "▽", "▽", "▽", "▽", null]

combos:
  - {p: [11, 12], k: TAB, l: [BASE, QWRT]}
  - {p: [12, 13], k: ESC, l: [BASE, QWRT]}
  - {p: [16, 17], k: ESC, l: [BASE, QWRT]}
  - {p: [22, 23], k: Enter, l: [BASE, QWRT]}
  - {p: [17, 18], k: Enter, l: [BASE, QWRT]}
  - {p: [2, 3], k: RESET, l: [FN]}
  - {p: [0, 1], k: BOOT, l: [FN]}
